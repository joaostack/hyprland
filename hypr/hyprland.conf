$mainMod = SUPER
$terminal = kitty
$fileManager = nautilus 
$menu = hyprlauncher

bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exec, command -v hyprshutdown >/dev/null 2>&1 && hyprshutdown || hyprctl dispatch exit
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, R, exec, $menu
bind = $mainMod, D, exec, rofi -show drun -show-icons -theme Arc-Dark
bind = $mainMod, Print, exec, hyprshot -m region
bind = $shiftMod, Print, exec, hyprshot -m window
bind = $mainMod, Escape, exec, killall waybar || waybar

bind = $mainMod ALT, left, workspace, -1
bind = $mainMod ALT, right, workspace, +1

bind = $mainMod SHIFT, left, movetoworkspace, -1
bind = $mainMod SHIFT, right, movetoworkspace, +1

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

bind = $mainMod CTRL, left,  movewindow, l
bind = $mainMod CTRL, right, movewindow, r
bind = $mainMod CTRL, up,    movewindow, u
bind = $mainMod CTRL, down,  movewindow, d

env =  QT_QPA_PLATFORMTHEME,qt5ct

bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow

monitor=HDMI-A-1, 1920x1080@120,0x0,1

input {
    kb_layout = br
    accel_profile = flat
    force_no_accel = true
}

decoration {
    rounding = 10
    blur {
        enabled = true
        size = 3
        passes = 1
    }
}

exec-once = waybar
exec-once = hyprpaper
exec-once = nm-applet
exec-once = dunst
